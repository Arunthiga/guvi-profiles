<!DOCTYPE html>
<html>
<head>
<title>Profile</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="profile-container">

    <div class="profile-header">
        <div class="profile-info">
            <img src="images/images.jpg" class="profile-pic">
            <div>
                <h4 id="displayName">Your Name</h4>
                <p id="displayEmail">youremail@gmail.com</p>
            </div>
        </div>
    </div>

    <div class="profile-form">
        <div class="row">

            <div class="col-md-6">
                <label>Full Name</label>
                <input id="fullname" class="form-control">
            </div>

            <div class="col-md-6">
                <label>Skills</label>
                <input id="skills" class="form-control">
            </div>

            <div class="col-md-6">
                <label>Gender</label>
                <select id="gender" class="form-control">
                    <option value="">Select</option>
                    <option>Male</option>
                    <option>Female</option>
                    <option>Other</option>
                </select>
            </div>

            <div class="col-md-6">
                <label>Country</label>
                <input id="country" class="form-control">
            </div>

            <div class="col-md-6">
                <label>Age</label>
                <input id="age" class="form-control">
            </div>

            <div class="col-md-6">
                <label>DOB</label>
                <input id="dob" type="date" class="form-control">
            </div>

            <div class="col-md-6">
                <label>Contact</label>
                <input id="contact" class="form-control">
            </div>

            <div class="col-md-6">
                <label>City</label>
                <input id="city" class="form-control">
            </div>

            <div class="col-12">
                <label>About Me</label>
                <textarea id="bio" class="form-control"></textarea>
            </div>

        </div>

        <button onclick="saveProfile()" class="btn btn-primary save-btn mt-3">
            Save Profile
        </button>
    </div>

</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="js/profile.js"></script>

</body>
</html>
